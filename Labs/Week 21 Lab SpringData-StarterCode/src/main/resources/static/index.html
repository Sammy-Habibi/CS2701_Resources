<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal Festival Events - Save the River</title>
    <meta name="description" content="Join our canal festival events and help keep our rivers clean. Discover 15 exciting waterway celebrations, from heritage days to music festivals along London's beautiful canals.">
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <!-- Header with background -->
    <header class="header">
    <div class="content">
        <div class="header-text">
            <h1>Let's Keep Our<br>Rivers Clean Together</h1>
            <p>Join Now To Make An Impact</p>
        </div>
        <div class="donation">
            <h2>Total Donation: £94,504</h2>
        </div>
    </div>
</header>

    <!-- Navigation -->
    <nav>
    <ul class="navlist">
        <li><a href="#home">Home</a></li>
        <li><a href="#cleaning">Cleaning</a></li>
        <li><a href="#event" class="active">Event</a></li>
        <li><a href="#donation">Donation</a></li>
        <li><a href="#login">Login</a></li>
    </ul>
</nav>

    <!-- Main content -->
    <main class="main-content">
        <h2 class="page-title">Our Canal Festival Events</h2>

        <!-- Events carousel -->
        <div class="carousel-container">
            <button class="carousel-btn carousel-prev" id="prevBtn" aria-label="Previous events">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <div class="carousel-wrapper">
                <div class="carousel-track" id="carouselTrack">
                    <!-- Event cards will be inserted here by JavaScript -->
                </div>
            </div>

            <button class="carousel-btn carousel-next" id="nextBtn" aria-label="Next events">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>Save the River &copy; 2025</p>
        </div>
    </footer>

    <!-- Event Modal (hidden by default) -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal" aria-label="Close modal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <div class="modal-info">
                    <div class="info-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <span id="modalDate"></span>
                    </div>
                    <div class="info-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <span id="modalTime"></span>
                    </div>
                    <div class="info-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span id="modalLocation"></span>
                    </div>
                </div>
            </div>

            <div class="modal-body">
                <div class="gallery-section">
                    <h3>Event Gallery</h3>
                    <div class="image-gallery" id="imageGallery"></div>
                </div>

                <div class="details-section">
                    <h3>Event Details</h3>
                    <p id="modalDetails"></p>
                </div>

                <div id="modalExtras"></div>

                <button class="btn-register">Register for Event</button>
            </div>
        </div>
    </div>

    <!-- Lightbox (hidden by default) -->
    <div class="lightbox-overlay" id="lightbox">
        <button class="lightbox-close" id="closeLightbox" aria-label="Close lightbox">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <button class="lightbox-btn lightbox-prev" id="lightboxPrev">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <div class="lightbox-content">
            <img id="lightboxImage" src="" alt="">
            <p class="lightbox-counter" id="lightboxCounter"></p>
        </div>
        <button class="lightbox-btn lightbox-next" id="lightboxNext">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <script src="events-final.js"></script>
</body>
</html>
